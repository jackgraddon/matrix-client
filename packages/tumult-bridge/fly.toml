app = "tumult-bridge"
primary_region = "ams"

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 1

# Note: Fly.io requires individual service definitions for each port,
# or using their newer "machine" API to bind larger ranges.
# For v1, we'll expose a small set of ports.
[[services]]
  protocol = "udp"
  internal_port = 10000
  [[services.ports]]
    port = 10000

[[services]]
  protocol = "udp"
  internal_port = 10001
  [[services.ports]]
    port = 10001

[[services]]
  protocol = "udp"
  internal_port = 10002
  [[services.ports]]
    port = 10002
